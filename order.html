<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>สั่งสินค้า</title>
<style>
:root{--g:#1D9E75;--gd:#0F6E56;--gl:#E6F7F1;--r:#E24B4A;--bg:#F5F6F8;--s:#fff;--b:#E8EAED;--t:#1A1C22;--t2:#5F6470;--t3:#9AA0AD;--rr:10px;--r2:7px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans Thai','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--t);font-size:14px}

/* STICKY HEADER STACK */
.topbar{background:var(--g);color:#fff;padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.shop-name{font-size:15px;font-weight:700}
.shop-sub{font-size:11px;opacity:.8}

.search-box{background:var(--s);padding:8px 12px 6px;border-bottom:1px solid var(--b);position:sticky;top:50px;z-index:40}
.search-wrap{position:relative}
.search-inp{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--b);border-radius:25px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;color:var(--t)}
.search-inp:focus{border-color:var(--g);background:#fff}
.search-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px}

.cats{display:flex;gap:6px;overflow-x:auto;padding:7px 12px;background:var(--s);border-bottom:1px solid var(--b);position:sticky;top:calc(50px + 50px);z-index:39;scrollbar-width:none;box-shadow:0 2px 4px rgba(0,0,0,.04)}
.cats::-webkit-scrollbar{display:none}
.cp{padding:5px 13px;border-radius:20px;border:1.5px solid var(--b);background:var(--s);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s}
.cp.on{background:var(--g);color:#fff;border-color:var(--g)}

/* PRODUCT LIST */
.plist{padding:8px 10px 110px;display:flex;flex-direction:column;gap:5px}
.prow{background:var(--s);border:1px solid var(--b);border-radius:var(--r2);padding:9px 11px;display:flex;align-items:flex-start;gap:8px;position:relative;transition:border-color .12s}
.prow.sel{border-color:var(--g);background:#FAFFFE}
.sel-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--g);border-radius:50%;border:2px solid #fff}
.pinfo{flex:1;min-width:0}
.pname-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.pname{font-size:13px;font-weight:700;color:var(--t);line-height:1.3}
.pcode{font-size:10px;color:var(--t3);background:var(--bg);padding:1px 6px;border-radius:4px;font-family:monospace;flex-shrink:0}
.pnote{width:100%;padding:5px 8px;border:1px solid var(--b);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:var(--bg);color:var(--t2)}
.pnote:focus{border-color:var(--g);background:#fff}
.pctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:2px}
.qb{width:28px;height:28px;border-radius:6px;border:1px solid var(--b);background:var(--bg);color:var(--t2);cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
.qb:hover,.qb:active{border-color:var(--g);color:var(--g)}
.qb.pl{background:var(--g);border-color:var(--g);color:#fff}
.qb.pl:hover{background:var(--gd)}
.qi{width:36px;text-align:center;border:1px solid var(--b);border-radius:5px;font-size:13px;font-weight:700;padding:4px 0;font-family:inherit;outline:none}
.qi:focus{border-color:var(--g)}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}

/* FAB */
.cart-fab{position:fixed;bottom:22px;right:16px;z-index:40;background:var(--g);color:#fff;border:none;border-radius:50px;padding:12px 18px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(29,158,117,.4);cursor:pointer;font-family:inherit}
.cart-fab.hid{display:none}
.cart-badge{background:#fff;color:var(--g);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}

/* BOTTOM SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.sheet-bg.hid{display:none}
.sheet{background:var(--s);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0}
.sheet-hd{padding:10px 16px 10px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sheet-ti{font-size:15px;font-weight:700}
.sheet-cl{width:28px;height:28px;border:none;background:var(--bg);border-radius:50%;cursor:pointer;font-size:16px;color:var(--t2)}
.sheet-body{overflow-y:auto;flex:1}
.cust-form{padding:12px 16px;border-bottom:1px solid var(--b)}
.flabel{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;display:block}
.finput{width:100%;padding:8px 10px;border:1.5px solid var(--b);border-radius:var(--r2);font-size:13px;font-family:inherit;background:var(--bg);color:var(--t);outline:none;margin-bottom:8px}
.finput:focus{border-color:var(--g);background:#fff}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cart-items{padding:8px 16px}
.ci{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--b)}
.ci:last-child{border-bottom:none}
.ci-info{flex:1;min-width:0}
.ci-nm{font-size:12px;font-weight:700}
.ci-mt{font-size:11px;color:var(--t2);margin-top:1px}
.ci-del{width:22px;height:22px;border:none;background:none;cursor:pointer;color:var(--t3);font-size:14px;flex-shrink:0;padding:0;display:flex;align-items:center;justify-content:center}
.ci-del:hover{color:var(--r)}
.sheet-ft{padding:12px 16px;border-top:1px solid var(--b);flex-shrink:0}
.cnt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cnt-label{font-size:12px;color:var(--t2)}
.cnt-val{font-size:18px;font-weight:700}
.btn-order{width:100%;padding:13px;background:var(--g);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-order:active{background:var(--gd)}
.btn-order:disabled{background:#aaa}

/* SUCCESS */
.success-pg{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:var(--s)}
.suc-ic{font-size:60px;margin-bottom:14px}
.suc-title{font-size:20px;font-weight:700;color:var(--g);margin-bottom:8px}
.suc-ord{font-family:monospace;font-size:17px;font-weight:700;background:var(--gl);color:var(--gd);padding:8px 18px;border-radius:var(--r2);margin:10px 0 20px}
.suc-sub{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:24px}
.suc-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.btn-line-suc{padding:12px;background:#06C755;color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-again{padding:11px;background:var(--g);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* LINE MODAL */
.line-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.line-modal.hid{display:none}
.line-box{background:var(--s);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding-bottom:24px}
.line-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 8px}
.line-hd{padding:8px 16px 10px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.line-ti{font-size:14px;font-weight:700;color:#06C755}
.line-body{padding:12px 16px}
.line-pre{background:#f0faf5;border:1px solid #b2dfc8;border-radius:8px;padding:12px;font-size:11px;line-height:1.9;white-space:pre-wrap;font-family:monospace;color:#1a3a2a;max-height:220px;overflow-y:auto;margin-bottom:10px}
.btn-open-line{width:100%;padding:12px;background:#06C755;color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn-copy-line{width:100%;padding:11px;background:#fff;color:#06C755;border:2px solid #06C755;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;color:var(--t3);font-size:13px}
.spinner{width:34px;height:34px;border:3px solid var(--b);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-pg{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center}
.err-pg.on{display:flex}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1c22;color:#fff;padding:9px 18px;border-radius:25px;font-size:12px;z-index:300;white-space:nowrap}
.toast.hid{display:none}
</style>
</head>
<body>

<div id="loading-pg" class="loading"><div class="spinner"></div><div>กำลังโหลด...</div></div>
<div id="err-pg" class="err-pg"><div style="font-size:44px;margin-bottom:14px">⚠️</div><div style="font-size:17px;font-weight:700;margin-bottom:8px">ไม่พบร้านค้านี้</div><div style="font-size:12px;color:var(--t3)" id="err-msg"></div></div>

<div id="main-pg" style="display:none">
  <!-- STICKY HEADER -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="history.back()" style="width:30px;height:30px;border:none;background:rgba(255,255,255,.2);border-radius:50%;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0">‹</button>
      <div><div class="shop-name" id="top-name">ร้านค้า</div><div class="shop-sub">Go Wholesale Rayong</div></div>
    </div>
    <div style="font-size:11px;opacity:.8" id="top-date"></div>
  </div>
  <!-- STICKY SEARCH -->
  <div class="search-box">
    <div class="search-wrap">
      <span class="search-ic">🔍</span>
      <input class="search-inp" id="srch" placeholder="ค้นหาสินค้า รหัส..." oninput="renderList()" />
    </div>
  </div>
  <!-- STICKY CATS -->
  <div class="cats" id="cats"></div>
  <!-- PRODUCT LIST -->
  <div class="plist" id="plist"></div>

  <button class="cart-fab hid" id="fab" onclick="openCart()">
    🛒 รายการที่สั่ง
    <div class="cart-badge" id="fab-cnt">0</div>
  </button>
</div>

<!-- SUCCESS PAGE -->
<div class="success-pg" id="suc-pg">
  <div class="suc-ic">✅</div>
  <div class="suc-title">ส่งออร์เดอร์แล้วค่ะ!</div>
  <div class="suc-ord" id="suc-ord"></div>
  <div class="suc-sub" id="suc-detail"></div>
  <div class="suc-btns">
    <button class="btn-line-suc" onclick="openLineModal()">💬 ส่งออร์เดอร์ทาง Line</button>
    <button class="btn-again" onclick="resetOrder()">สั่งอีกครั้ง</button>
  </div>
</div>

<!-- CART SHEET -->
<div class="sheet-bg hid" id="sheet-bg" onclick="closeCart()">
<div class="sheet" onclick="event.stopPropagation()">
  <div class="sheet-handle"></div>
  <div class="sheet-hd">
    <div class="sheet-ti">🛒 รายการที่สั่ง</div>
    <button class="sheet-cl" onclick="closeCart()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="cust-form">
      <label class="flabel">ชื่อผู้ติดต่อ *</label>
      <input class="finput" id="f-contact" placeholder="ชื่อ-นามสกุล หรือชื่อร้าน" />
      <div class="fgrid">
        <div><label class="flabel">เบอร์โทร</label><input class="finput" id="f-tel" placeholder="08x-xxx-xxxx" type="tel" /></div>
        <div><label class="flabel">วันที่รับของ</label><input class="finput" id="f-date" type="date" /></div>
      </div>
      <label class="flabel">หมายเหตุรวม</label>
      <input class="finput" id="f-note" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)" style="margin-bottom:0" />
    </div>
    <div style="padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em">รายการสินค้า</div>
    <div class="cart-items" id="cart-items"></div>
  </div>
  <div class="sheet-ft">
    <div class="cnt-row">
      <span class="cnt-label">รายการที่สั่ง</span>
      <span class="cnt-val"><span id="sheet-cnt">0</span> รายการ</span>
    </div>
    <button class="btn-order" id="btn-order" onclick="submitOrder()">✅ ยืนยันการสั่งสินค้า</button>
  </div>
</div>
</div>

<!-- LINE MODAL -->
<div class="line-modal hid" id="line-modal" onclick="closeLineModal()">
<div class="line-box" onclick="event.stopPropagation()">
  <div class="line-handle"></div>
  <div class="line-hd">
    <div class="line-ti">💬 ส่งออร์เดอร์ทาง Line</div>
    <button class="sheet-cl" onclick="closeLineModal()">✕</button>
  </div>
  <div class="line-body">
    <div class="line-pre" id="line-msg"></div>
    <button class="btn-open-line" onclick="openLineApp()">📱 เปิด Line แล้วส่งเลย (มือถือ)</button>
    <button class="btn-copy-line" onclick="copyLine()">📋 คัดลอกข้อความ</button>
  </div>
</div>
</div>

<div class="toast hid" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycby03tcfYljZFpC08cXSoZLNpyaVGn0iFrwgDCeSGm7AAnDG3eQYgXA4oTvqSMXgHVSK/exec';
let shopData=null, products=[], cart={}, itemNotes={}, activeCat='ทั้งหมด';
const shopId = new URLSearchParams(location.search).get('shop');

async function init(){
  if(!shopId){ showErr('ไม่พบรหัสร้านค่ะ'); return; }
  try{
    const r = await fetch(API+'?action=getShop&shopId='+shopId+'&_t='+Date.now());
    const d = await r.json();
    if(d.error||!d.shop){ showErr(d.error||'ไม่พบร้านนี้'); return; }
    shopData = d.shop;
    products = (d.products||[]).filter(p=>p.name && p.name.length>1);
    document.getElementById('loading-pg').style.display='none';
    document.getElementById('main-pg').style.display='block';
    document.getElementById('top-name').textContent = shopData.name;
    document.title = 'สั่งสินค้า — '+shopData.name;
    document.getElementById('top-date').textContent = new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'});
    const tmr=new Date(); tmr.setDate(tmr.getDate()+1);
    document.getElementById('f-date').value = tmr.toISOString().split('T')[0];
    buildCats(); renderList();
  } catch(e){ showErr('เชื่อมต่อไม่ได้: '+e.message); }
}

function showErr(msg){
  document.getElementById('loading-pg').style.display='none';
  document.getElementById('err-pg').classList.add('on');
  document.getElementById('err-msg').textContent=msg;
}

function buildCats(){
  const cc=document.getElementById('cats'); cc.innerHTML='';
  const cats=['ทั้งหมด',...new Set(products.map(p=>p.cat).filter(Boolean))];
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cp'+(c==='ทั้งหมด'?' on':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;document.querySelectorAll('.cp').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderList();};
    cc.appendChild(b);
  });
}

function renderList(){
  const q=document.getElementById('srch').value.toLowerCase();
  const g=document.getElementById('plist'); g.innerHTML='';
  const list=products.filter(p=>{
    const mc=activeCat==='ทั้งหมด'||p.cat===activeCat;
    const mq=p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q);
    return mc&&mq;
  });
  if(!list.length){g.innerHTML='<div class="empty">🔍 ไม่พบสินค้า</div>';return;}
  list.forEach(p=>{
    const qty=cart[p.id]||0;
    const note=itemNotes[p.id]||'';
    const d=document.createElement('div');
    d.className='prow'+(qty>0?' sel':''); d.id='pr-'+p.id;
    d.innerHTML=`
      ${qty>0?'<div class="sel-dot"></div>':''}
      <div class="pinfo">
        <div class="pname-row">
          ${p.code?`<span class="pcode">#${p.code}</span>`:''}
          <span class="pname">${p.name}</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:10px;color:var(--t3);display:flex;align-items:center;gap:3px">
            <span style="width:6px;height:6px;border-radius:50%;background:${{'ผักและผลไม้':'#1D9E75','ของสด':'#BA7517','แช่แข็ง':'#185FA5','เครื่องปรุง':'#7F77DD','เครื่องดื่ม':'#D4537E','เส้น':'#D85A30','ของใช้':'#888780','ขนม':'#E24B4A'}[p.cat]||'#aaa'};display:inline-block"></span>
            ${p.cat||''}${p.brand?' · '+p.brand:''}
          </span>
          ${p.price>0?`<span style="font-size:13px;font-weight:700;color:var(--g)">${Number(p.price).toLocaleString()} <span style="font-size:10px;color:var(--t3);font-weight:400">฿/${p.unit||''}</span></span>`:''}
        </div>
        <input class="pnote" type="text" placeholder="หมายเหตุสินค้านี้ (ถ้ามี)" value="${note}" id="note-${p.id}" onchange="setNote('${p.id}',this.value)" />
      </div>
      <div class="pctrl">
        <button class="qb" onclick="cq('${p.id}',-1)">−</button>
        <input class="qi" type="number" min="0" value="${qty}" id="qi-${p.id}" onchange="sq('${p.id}',this.value)" />
        <button class="qb pl" onclick="cq('${p.id}',1)">+</button>
      </div>`;
    g.appendChild(d);
  });
}

function setNote(id,val){ if(val.trim()) itemNotes[id]=val.trim(); else delete itemNotes[id]; }

function cq(id,d){
  const c=Number(cart[id])||0, n=Math.max(0,c+d);
  n?cart[id]=n:delete cart[id];
  updateRow(id); updateFab();
}
function sq(id,v){
  const n=Math.max(0,parseInt(v)||0);
  n?cart[id]=n:delete cart[id];
  updateRow(id); updateFab();
}

function updateRow(id){
  const qty=cart[id]||0;
  const inp=document.getElementById('qi-'+id); if(inp) inp.value=qty;
  const row=document.getElementById('pr-'+id);
  if(row){
    if(qty>0){row.classList.add('sel');if(!row.querySelector('.sel-dot')){const s=document.createElement('div');s.className='sel-dot';row.prepend(s);}}
    else{row.classList.remove('sel');const s=row.querySelector('.sel-dot');if(s)s.remove();}
  }
}

function updateFab(){
  const items=Object.entries(cart).filter(([,v])=>v>0);
  const cnt=items.reduce((s,[,v])=>s+v,0);
  const fab=document.getElementById('fab');
  if(cnt>0){fab.classList.remove('hid');document.getElementById('fab-cnt').textContent=cnt;}
  else fab.classList.add('hid');
}

function openCart(){
  renderCartItems();
  document.getElementById('sheet-bg').classList.remove('hid');
  document.body.style.overflow='hidden';
}
function closeCart(){
  document.getElementById('sheet-bg').classList.add('hid');
  document.body.style.overflow='';
}

function renderCartItems(){
  const items=Object.entries(cart).filter(([,v])=>v>0);
  const ci=document.getElementById('cart-items'); ci.innerHTML='';
  if(!items.length){ci.innerHTML='<div style="padding:16px;text-align:center;color:var(--t3);font-size:12px">ยังไม่มีสินค้า</div>';document.getElementById('sheet-cnt').textContent='0';return;}
  document.getElementById('sheet-cnt').textContent=items.length;
  items.forEach(([k,v])=>{
    const p=products.find(x=>String(x.id)===String(k)); if(!p) return;
    const note=itemNotes[String(p.id)]||'';
    const r=document.createElement('div'); r.className='ci';
    r.innerHTML=`<div class="ci-info">
      <div class="ci-nm">${p.code?'#'+p.code+' ':''}${p.name}</div>
      <div class="ci-mt">จำนวน <b>${v}</b> ${p.unit||''}${note?' · '+note:''}</div>
    </div>
    <button class="ci-del" onclick="delItem('${p.id}')" title="ลบ">✕</button>`;
    ci.appendChild(r);
  });
}

function delItem(id){delete cart[id];updateRow(id);updateFab();renderCartItems();}

async function submitOrder(){
  const items=Object.entries(cart).filter(([,v])=>v>0);
  if(!items.length){showToast('กรุณาเลือกสินค้าก่อนค่ะ');return;}
  const contact=document.getElementById('f-contact').value.trim();
  if(!contact){showToast('กรุณาใส่ชื่อผู้ติดต่อค่ะ');return;}
  const tel=document.getElementById('f-tel').value.trim();
  const btn=document.getElementById('btn-order');
  btn.disabled=true; btn.textContent='⏳ กำลังส่ง...';
  const orderItems=items.map(([k,v])=>{
    const p=products.find(x=>String(x.id)===String(k));
    return p?{id:p.id,code:p.code||'',name:p.name,unit:p.unit||'',qty:v,note:itemNotes[p.id]||''}:null;
  }).filter(Boolean);
  const noteText = document.getElementById('f-note').value.trim();
  const fullNote = contact+(tel?' | '+tel:'')+(noteText?' | '+noteText:'');
  try{
    const payload=JSON.stringify({action:'saveOrder',shopId,shopName:shopData.name,tel,deliveryDate:document.getElementById('f-date').value,note:fullNote,total:0,items:orderItems});
    const r=await fetch(API+'?body='+encodeURIComponent(payload));
    const data=await r.json();
    if(data.ok){
      closeCart();
      document.getElementById('main-pg').style.display='none';
      document.getElementById('suc-pg').style.display='flex';
      document.getElementById('suc-ord').textContent=data.orderId;
      document.getElementById('suc-detail').innerHTML=`ร้าน: <b>${shopData.name}</b><br>ผู้ติดต่อ: <b>${contact}</b><br>รับวันที่: ${document.getElementById('f-date').value||'—'}<br><br>ทีมงานจะติดต่อกลับเพื่อยืนยันค่ะ 🙏`;
      window._lastOrder={orderId:data.orderId,shopName:shopData.name,contact,tel,deliveryDate:document.getElementById('f-date').value,note:noteText,items:orderItems};
      cart={}; itemNotes={};
    } else showToast('เกิดข้อผิดพลาด: '+(data.error||'ลองใหม่ค่ะ'));
  } catch(e){ showToast('ส่งไม่ได้: '+e.message); }
  btn.disabled=false; btn.textContent='✅ ยืนยันการสั่งสินค้า';
}

function resetOrder(){
  document.getElementById('suc-pg').style.display='none';
  document.getElementById('main-pg').style.display='block';
  renderList(); updateFab();
}

function openLineModal(){
  const o=window._lastOrder; if(!o) return;
  const d=new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'});
  let msg='🛒 ใบสั่งสินค้า — Go Wholesale Rayong\n';
  msg+='──────────────────\n';
  msg+=`🏪 ร้าน: ${o.shopName}\n`;
  msg+=`👤 ผู้ติดต่อ: ${o.contact}\n`;
  if(o.tel) msg+=`📞 โทร: ${o.tel}\n`;
  msg+=`📅 รับวันที่: ${o.deliveryDate||'-'}\n`;
  msg+=`📋 เลขที่: ${o.orderId}\n`;
  msg+='──────────────────\n';
  o.items.forEach(i=>{ msg+=`• ${i.code?'#'+i.code+' ':''}${i.name}  จำนวน ${i.qty} ${i.unit||''}${i.note?' ('+i.note+')':''}\n`; });
  msg+='──────────────────\n';
  if(o.note) msg+=`📌 หมายเหตุ: ${o.note}\n`;
  msg+=`🗓 วันที่สั่ง: ${d}`;
  document.getElementById('line-msg').textContent=msg;
  window._lineMsg=msg;
  document.getElementById('line-modal').classList.remove('hid');
}
function closeLineModal(){ document.getElementById('line-modal').classList.add('hid'); }
function openLineApp(){
  const enc=encodeURIComponent(window._lineMsg||'');
  window.location.href='line://msg/text/'+enc;
  setTimeout(()=>window.open('https://line.me/R/msg/text/?'+enc,'_blank'),1000);
}
function copyLine(){
  navigator.clipboard.writeText(window._lineMsg||'')
    .then(()=>{showToast('✓ คัดลอกแล้วค่ะ');closeLineModal();})
    .catch(()=>showToast('กรุณาคัดลอกด้วยตัวเองค่ะ'));
}

let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hid');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.add('hid'),2500);}

init();
</script>
